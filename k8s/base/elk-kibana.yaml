apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: resilientops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.15.2
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.resilientops.svc.cluster.local:9200
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: resilientops
spec:
  selector:
    app: kibana
  ports:
    - name: web
      port: 5601
      targetPort: 5601
  type: ClusterIP
