apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: resilientops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: service-a
          image: resilientops/service-a:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CHAOS_LATENCY_MS
              value: "0"
            - name: CHAOS_ERROR_RATE
              value: "0"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: resilientops
spec:
  selector:
    app: service-a
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
