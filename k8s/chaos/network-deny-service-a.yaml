apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-gateway-to-service-a
  namespace: resilientops
spec:
  podSelector:
    matchLabels:
      app: service-a
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: service-a
