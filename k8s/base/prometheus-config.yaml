apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: resilientops
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    rule_files:
      - /etc/prometheus-rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.resilientops.svc.cluster.local:9093"]

    scrape_configs:
      - job_name: api-gateway
        static_configs:
          - targets: ["api-gateway.resilientops.svc.cluster.local:80"]
            labels:
              service: api-gateway
      - job_name: service-a
        static_configs:
          - targets: ["service-a.resilientops.svc.cluster.local:8001"]
            labels:
              service: service-a
      - job_name: service-b
        static_configs:
          - targets: ["service-b.resilientops.svc.cluster.local:8002"]
            labels:
              service: service-b
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus.resilientops.svc.cluster.local:9090"]
      - job_name: alert-webhook
        static_configs:
          - targets: ["alert-webhook.resilientops.svc.cluster.local:8081"]
